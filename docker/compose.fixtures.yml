# =============================================================================
# gofr-agent Test MCP Fixture Services - Docker Swarm Stack
# =============================================================================
# Four standalone MCP services (instruments, clients, trades, analytics)
# that the gofr-agent can connect to for integration/e2e testing.
#
# Each service accepts any non-empty Bearer token.
# Set FIXTURE_TOKEN to whatever value you want clients to use.
#
# Deploy:
#   docker stack deploy -c docker/compose.fixtures.yml gofr-agent-mcp-fixtures
#
# Remove:
#   docker stack rm gofr-agent-mcp-fixtures
#
# Logs:
#   docker service logs gofr-agent-mcp-fixtures_mcp-instruments -f
#
# Port map (published on all swarm nodes):
#   instruments  -> host:8500  (internal 8500)
#   clients      -> host:8501  (internal 8501)
#   trades       -> host:8502  (internal 8502)
#   analytics    -> host:8503  (internal 8503)
# =============================================================================

version: "3.9"

# ── Shared anchor ─────────────────────────────────────────────────────────────

x-svc-defaults: &svc-defaults
  image: ${GOFR_FIXTURE_IMAGE_NAME:-gofr-agent-mcp-fixtures}:${GOFR_FIXTURE_IMAGE_TAG:-latest}
  networks:
    - fixtures-net
  user: "10001:10001"
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  cap_drop:
    - ALL
  stop_grace_period: 15s
  labels:
    com.gofr.project: "gofr-agent"
    com.gofr.stack: "gofr-agent-mcp-fixtures"
    com.gofr.component: "test-mcp-fixture"
  deploy:
    replicas: 1
    labels:
      com.gofr.project: "gofr-agent"
      com.gofr.stack: "gofr-agent-mcp-fixtures"
      com.gofr.component: "test-mcp-fixture"
    restart_policy:
      condition: on-failure
      delay: 5s
      max_attempts: 3
    update_config:
      parallelism: 1
      delay: 10s
      order: stop-first
    resources:
      limits:
        cpus: "0.50"
        memory: 256M
      reservations:
        memory: 64M

# ── Services ──────────────────────────────────────────────────────────────────

services:

  mcp-instruments:
    <<: *svc-defaults
    hostname: gofr-agent-mcp-instruments
    command: ["--service", "instruments", "--port", "8500"]
    environment:
      SERVICE_NAME: "gofr-agent-mcp-instruments"
      SERVICE_PORT: "8500"
      GOFR_FIXTURES_HUB_CALLBACK_TOKEN: "${GOFR_FIXTURES_HUB_CALLBACK_TOKEN:-dev-fixtures-hub-token}"
    ports:
      - target: 8500
        published: "${FIXTURE_INSTRUMENTS_PORT:-8500}"
        protocol: tcp
        mode: host
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.socket(); s.settimeout(2);
           s.connect(('127.0.0.1', 8500)); s.close()"
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  mcp-clients:
    <<: *svc-defaults
    hostname: gofr-agent-mcp-clients
    command: ["--service", "clients", "--port", "8501"]
    environment:
      SERVICE_NAME: "gofr-agent-mcp-clients"
      SERVICE_PORT: "8501"
    ports:
      - target: 8501
        published: "${FIXTURE_CLIENTS_PORT:-8501}"
        protocol: tcp
        mode: host
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.socket(); s.settimeout(2);
           s.connect(('127.0.0.1', 8501)); s.close()"
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  mcp-trades:
    <<: *svc-defaults
    hostname: gofr-agent-mcp-trades
    command: ["--service", "trades", "--port", "8502"]
    environment:
      SERVICE_NAME: "gofr-agent-mcp-trades"
      SERVICE_PORT: "8502"
    ports:
      - target: 8502
        published: "${FIXTURE_TRADES_PORT:-8502}"
        protocol: tcp
        mode: host
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.socket(); s.settimeout(2);
           s.connect(('127.0.0.1', 8502)); s.close()"
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  mcp-analytics:
    <<: *svc-defaults
    hostname: gofr-agent-mcp-analytics
    command: ["--service", "analytics", "--port", "8503"]
    environment:
      SERVICE_NAME: "gofr-agent-mcp-analytics"
      SERVICE_PORT: "8503"
      GOFR_FIXTURES_HUB_CALLBACK_TOKEN: "${GOFR_FIXTURES_HUB_CALLBACK_TOKEN:-dev-fixtures-hub-token}"
    ports:
      - target: 8503
        published: "${FIXTURE_ANALYTICS_PORT:-8503}"
        protocol: tcp
        mode: host
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.socket(); s.settimeout(2);
           s.connect(('127.0.0.1', 8503)); s.close()"
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

# ── Network ────────────────────────────────────────────────────────────────────

networks:
  fixtures-net:
    name: gofr-agent-mcp-fixtures-net
    driver: overlay
    attachable: true
    labels:
      com.gofr.project: "gofr-agent"
      com.gofr.stack: "gofr-agent-mcp-fixtures"
      com.gofr.component: "test-mcp-fixture-network"
