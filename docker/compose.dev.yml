name: gofr-agent-dev

x-agent-common: &agent-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.dev
  image: gofr-agent-dev:latest
  user: "${GOFR_AGENT_COMPOSE_USER:-0:0}"
  working_dir: /home/gofr/devroot/gofr-agent
  restart: unless-stopped
  volumes:
    - gofr-agent-data-dev:/home/gofr/devroot/gofr-agent/data:rw
  environment:
    GOFR_AGENT_LLM_MODEL: ${GOFR_AGENT_LLM_MODEL:-test}
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    GOFR_AGENT_LOG_LEVEL: ${GOFR_AGENT_LOG_LEVEL:-INFO}
    GOFR_AGENT_MCP_ALLOWED_HOSTS: ${GOFR_AGENT_MCP_ALLOWED_HOSTS:-gofr-agent-dev,gofr-agent-dev:8090,gofr-agent,gofr-agent:8090,gofr-agent-runtime,gofr-agent-runtime:8090,gofr-agent-workspace,gofr-agent-workspace:8090,gofr-agent-manual,gofr-agent-manual:8090,127.0.0.1:*,localhost:*,[::1]:*}
    GOFR_AGENT_MCP_ALLOWED_ORIGINS: ${GOFR_AGENT_MCP_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://gofr-console-dev:3000}
    GOFR_AGENT_CORS_ORIGINS: ${GOFR_AGENT_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://gofr-console-dev:3000}
  networks:
    - gofr-dev-net

x-fixture-common: &fixture-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.fixtures
  image: gofr-agent-mcp-fixtures:latest
  user: "10001:10001"
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  cap_drop:
    - ALL
  restart: unless-stopped
  networks:
    - gofr-dev-net

services:
  gofr-agent-runtime:
    <<: *agent-common
    profiles: ["runtime"]
    container_name: gofr-agent-runtime
    hostname: gofr-agent-runtime
    command:
      - ./scripts/start-real-server.sh
      - --services-file
      - /home/gofr/devroot/gofr-agent/docker/services.compose.dev.yml
      - --hub-store-backend
      - external_cache
      - --hub-cache-url
      - redis://gofr-agent-valkey:6379/0
      - --hub-url
      - http://gofr-agent-dev:8090/mcp
    depends_on:
      valkey:
        condition: service_healthy
      mcp-instruments:
        condition: service_healthy
      mcp-clients:
        condition: service_healthy
      mcp-trades:
        condition: service_healthy
      mcp-analytics:
        condition: service_healthy
    ports:
      - "8090:8090"
    networks:
      gofr-dev-net:
        aliases:
          - gofr-agent-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8090/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  gofr-agent-workspace:
    <<: *agent-common
    profiles: ["workspace"]
    container_name: gofr-agent-workspace
    hostname: gofr-agent-workspace
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      valkey:
        condition: service_healthy
      mcp-instruments:
        condition: service_healthy
      mcp-clients:
        condition: service_healthy
      mcp-trades:
        condition: service_healthy
      mcp-analytics:
        condition: service_healthy
    ports:
      - "8090:8090"
    networks:
      gofr-dev-net:
        aliases:
          - gofr-agent-dev

  valkey:
    image: valkey/valkey:8-alpine
    container_name: gofr-agent-valkey
    hostname: gofr-agent-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gofr-dev-net

  mcp-instruments:
    <<: *fixture-common
    container_name: gofr-agent-mcp-instruments
    hostname: gofr-agent-mcp-instruments
    command: ["--service", "instruments", "--port", "8500"]
    environment:
      SERVICE_NAME: gofr-agent-mcp-instruments
      SERVICE_PORT: "8500"
      GOFR_FIXTURES_HUB_CALLBACK_TOKEN: ${GOFR_FIXTURES_HUB_CALLBACK_TOKEN:-dev-fixtures-hub-token}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8500)); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  mcp-clients:
    <<: *fixture-common
    container_name: gofr-agent-mcp-clients
    hostname: gofr-agent-mcp-clients
    command: ["--service", "clients", "--port", "8501"]
    environment:
      SERVICE_NAME: gofr-agent-mcp-clients
      SERVICE_PORT: "8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8501)); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  mcp-trades:
    <<: *fixture-common
    container_name: gofr-agent-mcp-trades
    hostname: gofr-agent-mcp-trades
    command: ["--service", "trades", "--port", "8502"]
    environment:
      SERVICE_NAME: gofr-agent-mcp-trades
      SERVICE_PORT: "8502"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8502)); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  mcp-analytics:
    <<: *fixture-common
    container_name: gofr-agent-mcp-analytics
    hostname: gofr-agent-mcp-analytics
    command: ["--service", "analytics", "--port", "8503"]
    environment:
      SERVICE_NAME: gofr-agent-mcp-analytics
      SERVICE_PORT: "8503"
      GOFR_FIXTURES_HUB_CALLBACK_TOKEN: ${GOFR_FIXTURES_HUB_CALLBACK_TOKEN:-dev-fixtures-hub-token}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8503)); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

networks:
  gofr-dev-net:
    name: gofr-dev-net
    driver: bridge

volumes:
  gofr-agent-data-dev: