# SEQ Log Server — Production Compose (persistent)
# Stores logs, indexes, and config in a named Docker volume.
#
# Usage:
#   docker compose -f docker/seq-compose.prod.yml up -d
#   docker compose -f docker/seq-compose.prod.yml down
#
# First-time volume creation:
#   docker volume create gofr-seq-data

name: gofr-seq-prod

services:
  seq:
    build:
      context: .
      dockerfile: Dockerfile.seq.prod
      args:
        - SEQ_BASE_IMAGE=${GOFR_SEQ_BASE_IMAGE:-datalust/seq:latest}
    image: gofr-seq-prod:latest
    container_name: gofr-seq
    hostname: gofr-seq
    restart: unless-stopped
    init: true
    stop_grace_period: 45s
    ports:
      - "${GOFR_SEQ_BIND_ADDR:-127.0.0.1}:${GOFR_SEQ_INGEST_PORT:-5341}:5341"  # Ingestion API (CLEF/JSON)
      - "${GOFR_SEQ_BIND_ADDR:-127.0.0.1}:${GOFR_SEQ_UI_PORT:-5380}:80"         # Web UI
    environment:
      - ACCEPT_EULA=Y
      - SEQ_STORAGE=/data
      - SEQ_FIRSTRUN_ADMINUSERNAME=${GOFR_SEQ_ADMIN_USERNAME:-admin}
      - SEQ_FIRSTRUN_ADMINPASSWORD=${GOFR_SEQ_ADMIN_PASSWORD:-}
    volumes:
      - gofr-seq-data:/data    # Logs, indexes, and SEQ config
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5341/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gofr-net

networks:
  gofr-net:
    external: true
    name: gofr-net

volumes:
  gofr-seq-data:
    name: gofr-seq-data
    external: true
